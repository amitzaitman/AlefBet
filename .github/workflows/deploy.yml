name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Assemble site
        run: |
          mkdir -p _site/framework
          touch _site/.nojekyll
          cp index.html _site/
          cp -r framework/dist _site/framework/dist
          cp -r games _site/games
          mkdir -p _site/apps/passover-cleaning
          cp -r apps/passover-cleaning/dist/. _site/apps/passover-cleaning/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
